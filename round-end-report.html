<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northbrook General - Round End Board Report</title>
<link rel="stylesheet" href="src/report/round-end-report.css">
<style>
  html,body{height:100%; margin:0; background:#0c0e15; overflow:hidden;}
  .rep-hdr select{
    background:#1a2030; border:2px solid #333c58; color:#cdd5e6; padding:5px 8px;
    font-family:"Courier New", ui-monospace, monospace; font-size:10px;
    letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-left:10px;
  }
</style>
</head>
<body>
<!-- Standalone preview of the quarterly board report.
     Runs the same data + report engine as the game (no sim):
     content comes from src/data/quarters-data.js, the report shell
     from src/report/round-end-report.js. Use the header dropdown to
     jump to any quarter; decisions carry stats into the next one. -->
<script src="src/data/scenario-data.js"></script>
<script src="src/data/quarters-data.js"></script>
<script>
/* engine shim: clamp normally comes from src/engine/canvas.js */
'use strict';
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
</script>
<script src="src/engine/game-state.js"></script>
<script src="src/report/report-graphs.js"></script>
<script src="src/report/round-end-report.js"></script>
<script>
'use strict';
(function(){
  /* without the live sim, "end of quarter" = start + all simEvents applied */
  function endOfQuarterStats(q,startStats){
    var s=cloneStats(startStats), e, k, ev;
    for(e=0;e<q.simEvents.length;e++){
      ev=q.simEvents[e];
      for(k in ev.effects){ if(ev.effects.hasOwnProperty(k)&&s[k]!=null) s[k]+=ev.effects[k]; }
    }
    return clampStats(s);
  }

  function addQuarterPicker(){
    var hdr=document.querySelector('.rep-root .rep-hdr');
    var sel=document.createElement('select'), i, op;
    for(i=0;i<QUARTERS.length;i++){
      op=document.createElement('option');
      op.value=String(i);
      op.textContent=QUARTERS[i].label+' - '+QUARTERS[i].name;
      sel.appendChild(op);
    }
    sel.value=String(GAME.currentQuarterIndex);
    sel.onchange=function(){ previewQuarter(parseInt(this.value,10)); };
    hdr.appendChild(sel);
  }

  function previewQuarter(i){
    GAME.currentQuarterIndex=i;
    var q=getCurrentQuarter();
    var prev=getCurrentStats();
    openBoardReport({
      quarter:q,
      prevStats:prev,
      curStats:endOfQuarterStats(q,prev),
      onAdvance:function(){
        if(isFinalQuarter()){
          renderYearEnd(function(){ resetGameState(); previewQuarter(0); });
        }else{
          previewQuarter(GAME.currentQuarterIndex+1);
        }
      }
    });
    addQuarterPicker();
  }

  previewQuarter(0);
})();
</script>
</body>
</html>
